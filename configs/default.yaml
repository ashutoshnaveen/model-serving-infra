# Model Serving Infrastructure - Default Configuration

server:
  host: "0.0.0.0"
  port: 8000
  workers: 1

model:
  name: "gpt2"
  device: "auto"  # auto, cpu, cuda, mps
  dtype: "float32"  # float32, float16, bfloat16

generation:
  max_tokens: 256
  temperature: 1.0
  top_k: 50
  top_p: 1.0
  repetition_penalty: 1.0

engine:
  max_batch_size: 32
  max_sequence_length: 1024
  scheduling_policy: "fcfs"  # fcfs, priority

cache:
  max_cache_size_mb: 1024
  block_size: 16
  eviction_policy: "lru"  # lru, fifo

logging:
  level: "INFO"
  format: "json"
